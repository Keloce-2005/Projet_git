name: Lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Installation des dépendances
        run: npm ci

      - name: Lancer ESLint
        run: npx eslint . --ext .js --max-warnings 0
